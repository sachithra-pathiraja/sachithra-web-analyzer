<!DOCTYPE html>
<html>

<head>
<title>Web Analyzer</title>
<link rel="stylesheet" href="/static/css/styles.css">
</head>

<body>

<div class="container">

<h1>Web Analyzer</h1>

<form method="POST" action="/analyze" class="form">
<input type="text" name="url" placeholder="Paste URL here..." required>
<button type="submit">Analyze</button>
</form>

{{if .}}

<div class="card">

<h2>{{.Title}}</h2>

<div class="section">
<span class="label">HTML Version:</span>
<span class="value">{{.HTMLVersion}}</span>
</div>

<div class="section">
<h3>Headings</h3>
<ul>
{{range .Headings}}
<li>Level: {{.Level}} — {{.Count}}</li>
{{end}}
</ul>
</div>

<div class="section">
<h3>Links</h3>
<ul>
{{range .Links}}
<li style="text-transform: capitalize;">{{.LinkType}} — {{.Count}}</li>
{{end}}
</ul>
</div>

<div class="section">
<span class="label">Login Form:</span>
<span class="value">
{{if .HasLoginForm}}Present{{else}}Not Present{{end}}
</span>
</div>

</div>

{{end}}

</div>

</body>
</html>
